<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود به سایت</title>

<style>
body{
font-family:tahoma;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;

/* رنگ برندت */
background: linear-gradient(-45deg, #b9b2ff, #9288EF, #d6d2ff, #8a80f0);
background-size: 400% 400%;
animation: bgMove 12s ease infinite;
}

@keyframes bgMove {
0% {background-position:0% 50%;}
50% {background-position:100% 50%;}
100% {background-position:0% 50%;}
}

.box{
background: rgba(255,255,255,0.95);
padding:45px 28px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.25);
max-width:420px;
backdrop-filter: blur(12px);
animation: float 4s ease-in-out infinite;
}

@keyframes float {
0% {transform: translateY(0);}
50% {transform: translateY(-12px);}
100% {transform: translateY(0);}
}

h2{
color:#333;
margin-bottom:15px;
font-size:22px;
}

p{
font-size:18px;
line-height:2;
color:#444;
}

a{
display:inline-block;
margin-top:25px;
background:#9288EF;
color:white;
padding:15px 34px;
border-radius:14px;
text-decoration:none;
font-size:18px;
transition:0.3s;
box-shadow:0 10px 25px rgba(146,136,239,0.5);
}

a:hover{
background:#7a70e0;
transform:scale(1.08);
box-shadow:0 15px 30px rgba(146,136,239,0.6);
}
</style>
</head>

<body>

<div class="box">
<h2>ورود به سایت</h2>

<p>
برای باز شدن بهتر سایت، لطفاً ابتدا فیلترشکن خود را خاموش کنید<br>
سپس روی دکمه زیر بزنید.<br><br>
با تشکر 🙏🌹
</p>

<a href="https://loop360x.ir">ورود به سایت</a>
</div>

</body>
</html>
